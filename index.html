<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>GymTracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --y:#FEAC27;--dk:#2b3542;
  --card:#fff;--border:#e2e5ed;--text:#2b3542;--text2:#6b7380;
  --bg:#f5f6fa;--bg2:#f0f1f5;
  --danger-bg:#fde8e8;--danger-text:#c0392b;
  --warn-bg:#fff3cd;--warn-text:#856404;
  --suc-bg:#d1fae5;--suc-text:#065f46;
  --info-bg:#dbeafe;--info-text:#1e40af;
  --purple-bg:#ede9fe;--purple-text:#5b21b6;
}
@media(prefers-color-scheme:dark){:root{
  --card:#1e2430;--border:#3a4050;--text:#e8eaf0;--text2:#8892a4;
  --bg:#141920;--bg2:#1a2030;
  --danger-bg:#3d1515;--danger-text:#f87171;
  --warn-bg:#3d2e05;--warn-text:#fbbf24;
  --suc-bg:#062318;--suc-text:#34d399;
  --info-bg:#0d1f40;--info-text:#60a5fa;
  --purple-bg:#1e1040;--purple-text:#a78bfa;
}}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;margin:0;color:var(--text)}
#app{max-width:500px;margin:0 auto;padding:16px;min-height:100vh}
h1{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 13px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;margin-bottom:-1px;transition:color .15s,border-color .15s;font-family:inherit;white-space:nowrap}
.tab-btn.active{color:var(--y);border-bottom-color:var(--y)}
.view{display:none}.view.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.field select,.field input,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.field select:focus,.field input:focus,.field textarea:focus{border-color:var(--y)}
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;font-family:inherit}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--y);border-color:var(--y);color:#1b2230}
.btn-primary:hover{background:#e09918;border-color:#e09918}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:15px;border-radius:7px}
.btn-danger{border-color:#f5b7b1;color:var(--danger-text);background:var(--danger-bg)}
.btn-danger:hover{opacity:.85}
.serie-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;position:relative;transition:border-color .2s,background .2s}
.serie-box.done{border-color:var(--y);background:rgba(254,172,39,.1)}
.serie-num{font-size:10px;color:var(--text2);margin-bottom:3px}
.serie-val{font-size:14px;font-weight:600;color:var(--text);line-height:1}
.serie-sub{font-size:10px;color:var(--text2);margin-top:2px}
.serie-check{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.serie-check.done-chk{background:var(--y);border-color:var(--y);color:#1b2230}
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-bottom:8px}
.prog-wrap{height:4px;background:var(--bg2);border-radius:4px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;background:var(--y);border-radius:4px;transition:width .3s}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.kpi-val{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.kpi-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.chip{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text2);background:var(--bg2);margin-right:3px;margin-bottom:3px;display:inline-block}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.cfg-input{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.cfg-input:focus{border-color:var(--y)}
.notes-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;font-family:inherit;min-height:56px;resize:vertical;outline:none}
.notes-input:focus{border-color:var(--y)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--dk);color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;transition:transform .25s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:36px 16px;color:var(--text2);font-size:13px;line-height:1.6}

/* Imagen ejercicio */
.ej-img-wrap{background:var(--bg2);border-radius:8px;overflow:hidden;margin-bottom:10px;display:flex;align-items:center;justify-content:center;height:110px;cursor:pointer;border:1px solid var(--border)}
.ej-img-wrap svg{max-height:100px;width:auto}

/* Modal imagen */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:14px;padding:20px;max-width:340px;width:90%;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);line-height:1}
.modal-ej-img{display:flex;align-items:center;justify-content:center;background:var(--bg2);border-radius:10px;padding:16px;margin-bottom:12px;min-height:160px}
.modal-ej-img svg{max-height:150px;width:auto}

/* Constructor de rutinas */
.ej-lib-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:320px;overflow-y:auto;margin-bottom:10px}
.ej-lib-item{border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;transition:border-color .2s,background .2s;display:flex;align-items:center;gap:8px}
.ej-lib-item:hover{border-color:var(--y)}
.ej-lib-item.selected{border-color:var(--y);background:rgba(254,172,39,.08)}
.ej-lib-thumb{width:40px;height:40px;background:var(--bg2);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ej-lib-thumb svg{max-width:36px;max-height:36px}
.ej-lib-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.ej-lib-musc{font-size:10px;color:var(--text2);margin-top:1px}
.ej-sel-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.ej-sel-item:last-child{border-bottom:none}

.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fchip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text2);background:var(--card);cursor:pointer;transition:all .15s}
.fchip.active{background:var(--y);border-color:var(--y);color:#1b2230;font-weight:600}

.rutinas-custom-list .rut-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.rutinas-custom-list .rut-item:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="app">
  <h1>💪 GymTracker</h1>
  <p class="sub">Registrá tu entrenamiento, série por série</p>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('entrenar')">Entrenar</button>
    <button class="tab-btn" onclick="switchTab('historial')">Historial</button>
    <button class="tab-btn" onclick="switchTab('progreso')">Progreso</button>
    <button class="tab-btn" onclick="switchTab('misrutinas')">Mis Rutinas</button>
    <button class="tab-btn" onclick="switchTab('biblioteca')">Biblioteca</button>
  </div>

  <!-- ENTRENAR -->
  <div id="view-entrenar" class="view active">
    <div class="card">
      <div class="field">
        <label>Día</label>
        <select id="sel-dia" onchange="cambiarDia()">
          <option>Lunes</option><option>Martes</option><option>Miércoles</option>
          <option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
        </select>
      </div>
      <div class="field">
        <label>Rutina</label>
        <select id="sel-rutina" onchange="cargarRutina()"></select>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div id="rutina-desc" style="font-size:12px;color:var(--text2)"></div>
        <button class="btn btn-sm btn-primary" onclick="guardarSesion()">💾 Guardar sesión</button>
      </div>
    </div>
    <div id="kpi-sesion" style="display:none">
      <div class="kpi-row">
        <div class="kpi-box"><div class="kpi-val" id="k-series">0</div><div class="kpi-lbl">Series ✓</div></div>
        <div class="kpi-box"><div class="kpi-val" id="k-reps">0</div><div class="kpi-lbl">Reps total</div></div>
        <div class="kpi-box"><div class="kpi-val" id="k-vol">0</div><div class="kpi-lbl">Volumen kg</div></div>
      </div>
    </div>
    <div id="ejercicios-container"></div>
  </div>

  <!-- HISTORIAL -->
  <div id="view-historial" class="view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:14px;font-weight:600;color:var(--text)">Sesiones guardadas</span>
      <button class="btn btn-sm btn-danger" onclick="borrarTodoHistorial()">Borrar todo</button>
    </div>
    <div id="historial-list"></div>
  </div>

  <!-- PROGRESO -->
  <div id="view-progreso" class="view">
    <div class="card" style="margin-bottom:12px">
      <div class="field" style="margin-bottom:0">
        <label>Ejercicio</label>
        <select id="sel-ej-prog" onchange="mostrarProgreso()"></select>
      </div>
    </div>
    <div id="progreso-content"></div>
  </div>

  <!-- MIS RUTINAS -->
  <div id="view-misrutinas" class="view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:14px;font-weight:600;color:var(--text)">Mis rutinas personalizadas</span>
      <button class="btn btn-sm btn-primary" onclick="abrirConstructor()">+ Nueva rutina</button>
    </div>
    <div id="mis-rutinas-list"></div>

    <!-- Constructor -->
    <div id="constructor" style="display:none">
      <div class="card">
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px" id="constructor-titulo">Nueva rutina</div>
        <div class="field">
          <label>Nombre de la rutina</label>
          <input type="text" id="inp-rut-nombre" placeholder="Ej: Upper Body — Pesado">
        </div>
        <div class="field">
          <label>Descripción</label>
          <input type="text" id="inp-rut-desc" placeholder="Ej: Fuerza máxima 3-5 reps">
        </div>

        <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Filtrar por músculo</div>
        <div class="filter-chips" id="filter-chips-constructor"></div>

        <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Seleccionar ejercicios</div>
        <div class="ej-lib-grid" id="ej-lib-grid"></div>

        <div id="ej-seleccionados-wrap" style="display:none;margin-bottom:12px">
          <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Ejercicios seleccionados</div>
          <div id="ej-seleccionados-list"></div>
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="guardarRutinaCustom()">Guardar rutina</button>
          <button class="btn" onclick="cerrarConstructor()">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BIBLIOTECA -->
  <div id="view-biblioteca" class="view">
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px">Biblioteca de ejercicios</div>
    <div class="filter-chips" id="filter-chips-bib"></div>
    <div id="bib-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px"></div>
  </div>
</div>

<!-- Modal imagen ejercicio -->
<div class="modal-overlay" id="modal-ej" onclick="cerrarModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('modal-ej').classList.remove('open')">✕</button>
    <div class="modal-ej-img" id="modal-ej-img"></div>
    <div style="font-size:16px;font-weight:600;color:var(--text)" id="modal-ej-nombre"></div>
    <div style="font-size:13px;color:var(--text2);margin-top:3px" id="modal-ej-musc"></div>
    <div style="font-size:13px;color:var(--text);margin-top:10px;line-height:1.6" id="modal-ej-tip"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// RUTINAS PREDEFINIDAS
// ═══════════════════════════════════════════════════════
const RUTINAS_BASE = {
  "Pecho + Tríceps":    {desc:"Empuje horizontal",  ejs:["press_banca","aperturas","press_inclinado","fondos","press_frances","ext_triceps"]},
  "Espalda + Bíceps":   {desc:"Tirón vertical y horizontal", ejs:["dominadas","remo_barra","jalon","curl_biceps","curl_martillo"]},
  "Piernas":            {desc:"Cuádriceps, isquios y glúteos", ejs:["sentadilla","hip_thrust","curl_isquio","pantorrillas"]},
  "Hombros + Trapecio": {desc:"Empuje vertical y elevaciones", ejs:["press_militar","elevaciones_lat","encogimientos"]},
  "Core + Abdomen":     {desc:"Estabilización y fuerza central", ejs:["plancha","crunch","russian_twist"]}
};
const DIAS_RUTINA = {"Lunes":"Pecho + Tríceps","Martes":"Espalda + Bíceps","Miércoles":"Piernas","Jueves":"Hombros + Trapecio","Viernes":"Pecho + Tríceps","Sábado":"Core + Abdomen","Domingo":"Piernas"};

function getEj(id){return EJERCICIOS_LIB.find(e=>e.id===id)}
function getRutinaEjs(rutObj){return (rutObj.ejs||[]).map(id=>getEj(id)).filter(Boolean)}

// ═══════════════════════════════════════════════════════
// PERSISTENCIA
// ═══════════════════════════════════════════════════════
function getHist(){try{return JSON.parse(localStorage.getItem('gym_hist')||'[]')}catch(e){return[]}}
function setHist(h){try{localStorage.setItem('gym_hist',JSON.stringify(h))}catch(e){}}
function getCustomRutinas(){try{return JSON.parse(localStorage.getItem('gym_rutinas')||'[]')}catch(e){return[]}}
function setCustomRutinas(r){try{localStorage.setItem('gym_rutinas',JSON.stringify(r))}catch(e){}}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ═══════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════
function switchTab(name){
  const names=['entrenar','historial','progreso','misrutinas','biblioteca'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(name==='historial')  renderHistorial();
  if(name==='progreso')   renderProgresoSel();
  if(name==='misrutinas') renderMisRutinas();
  if(name==='biblioteca') renderBiblioteca();
}

// ═══════════════════════════════════════════════════════
// SELECTS RUTINA
// ═══════════════════════════════════════════════════════
function buildAllRutinas(){
  const custom=getCustomRutinas();
  const all={};
  Object.entries(RUTINAS_BASE).forEach(([k,v])=>{all[k]={...v,custom:false}});
  custom.forEach(r=>{all[r.nombre]={desc:r.desc,ejs:r.ejs,custom:true}});
  return all;
}

function initSelects(){
  const all=buildAllRutinas();
  const sel=document.getElementById('sel-rutina');
  sel.innerHTML='';
  Object.keys(all).forEach(k=>{
    const o=document.createElement('option');o.value=k;o.textContent=k+(all[k].custom?' ★':'');sel.appendChild(o);
  });
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const diaHoy=dias[new Date().getDay()];
  const selD=document.getElementById('sel-dia');
  for(let o of selD.options) if(o.value===diaHoy){o.selected=true;break;}
  cambiarDia();
}

function cambiarDia(){
  const dia=document.getElementById('sel-dia').value;
  const rut=DIAS_RUTINA[dia];
  const sel=document.getElementById('sel-rutina');
  for(let o of sel.options) if(o.value.startsWith(rut)){o.selected=true;break;}
  cargarRutina();
}

// ═══════════════════════════════════════════════════════
// SESIÓN
// ═══════════════════════════════════════════════════════
let sesion={reps:{},pesos:{},checked:{},notas:{}};
let ejsActuales=[];

function cargarRutina(){
  const nombre=document.getElementById('sel-rutina').value;
  const all=buildAllRutinas();
  const rut=all[nombre];
  if(!rut) return;
  document.getElementById('rutina-desc').textContent=rut.desc;
  ejsActuales=getRutinaEjs(rut).map(e=>({...e}));
  sesion={reps:{},pesos:{},checked:{},notas:{}};
  ejsActuales.forEach((ej,ei)=>{
    for(let s=0;s<ej.series;s++){
      const k=`${ei}-${s}`;
      sesion.reps[k]=ej.reps;sesion.pesos[k]=ej.peso;sesion.checked[k]=false;
    }
    sesion.notas[ei]='';
  });
  renderEjercicios();actualizarKPIs();
}

function renderEjercicios(){
  const cont=document.getElementById('ejercicios-container');
  cont.innerHTML='';
  document.getElementById('kpi-sesion').style.display='block';
  ejsActuales.forEach((ej,ei)=>cont.appendChild(buildEjCard(ej,ei)));
}

function buildEjCard(ej,ei){
  const done=countDone(ei,ej.series);
  const pct=ej.series>0?Math.round(done/ej.series*100):0;
  let seriesHTML='';
  for(let s=0;s<ej.series;s++){
    const k=`${ei}-${s}`;const chk=sesion.checked[k];const r=sesion.reps[k];const p=sesion.pesos[k];
    seriesHTML+=`<div class="serie-box${chk?' done':''}" id="sbox-${k}">
      <div class="serie-num">Serie ${s+1}</div><div class="serie-val">${r}</div>
      <div class="serie-sub">${p>0?p+'kg':'Corp.'}</div>
      <div class="serie-check${chk?' done-chk':''}" onclick="toggleCheck(${ei},${s})">${chk?'✓':''}</div>
    </div>`;
  }
  const card=document.createElement('div');card.className='card-sm';card.id=`ej-card-${ei}`;
  card.innerHTML=`
    <div class="ej-img-wrap" onclick="abrirModalEj('${ej.id}')" title="Ver ilustración">${ej.svg}</div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
      <div style="flex:1;min-width:0;margin-right:8px">
        <div style="font-size:14px;font-weight:600;color:var(--text)">${ej.nombre}</div>
        <div style="font-size:11px;color:var(--text2)">${ej.musculo}</div>
      </div>
      <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
        <span style="font-size:11px;background:var(--warn-bg);color:var(--warn-text);padding:3px 9px;border-radius:20px">${ej.series}×${ej.reps}</span>
        <button class="btn btn-icon" onclick="toggleConfig(${ei})" style="font-size:13px">⚙️</button>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%" id="prog-${ei}"></div></div>
    <div class="series-grid" id="series-${ei}">${seriesHTML}</div>
    <div id="config-${ei}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Ajuste sesión</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:3px">Series</div>
          <input class="cfg-input" type="number" min="1" max="10" value="${ej.series}" id="inp-s-${ei}" onchange="ajustarConfig(${ei})"></div>
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:3px">Reps</div>
          <input class="cfg-input" type="number" min="1" max="120" value="${ej.reps}" id="inp-r-${ei}" onchange="ajustarConfig(${ei})"></div>
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:3px">Peso (kg)</div>
          <input class="cfg-input" type="number" min="0" max="500" step="2.5" value="${ej.peso}" id="inp-p-${ei}" onchange="ajustarConfig(${ei})"></div>
      </div>
      <div><div style="font-size:11px;color:var(--text2);margin-bottom:3px">Notas</div>
        <textarea class="notes-input" id="inp-n-${ei}" placeholder="Ej: subí 2.5kg, sensación...">${sesion.notas[ei]||''}</textarea>
      </div>
    </div>`;
  return card;
}

function countDone(ei,nS){let d=0;for(let s=0;s<nS;s++) if(sesion.checked[`${ei}-${s}`]) d++;return d;}

function toggleConfig(ei){
  const c=document.getElementById(`config-${ei}`);
  c.style.display=c.style.display==='none'?'block':'none';
}

function ajustarConfig(ei){
  const ej=ejsActuales[ei];
  const nS=Math.max(1,parseInt(document.getElementById(`inp-s-${ei}`).value)||ej.series);
  const nR=Math.max(1,parseInt(document.getElementById(`inp-r-${ei}`).value)||ej.reps);
  const nP=Math.max(0,parseFloat(document.getElementById(`inp-p-${ei}`).value)||0);
  sesion.notas[ei]=document.getElementById(`inp-n-${ei}`).value;
  const prevS=ej.series;ej.series=nS;ej.reps=nR;ej.peso=nP;
  for(let s=0;s<Math.max(nS,prevS);s++){
    const k=`${ei}-${s}`;
    if(s<nS){if(sesion.reps[k]===undefined)sesion.reps[k]=nR;if(sesion.pesos[k]===undefined)sesion.pesos[k]=nP;if(sesion.checked[k]===undefined)sesion.checked[k]=false;}
    else{delete sesion.reps[k];delete sesion.pesos[k];delete sesion.checked[k];}
  }
  let html='';
  for(let s=0;s<nS;s++){
    const k=`${ei}-${s}`;const chk=sesion.checked[k];const r=sesion.reps[k];const p=sesion.pesos[k];
    html+=`<div class="serie-box${chk?' done':''}" id="sbox-${k}"><div class="serie-num">Serie ${s+1}</div><div class="serie-val">${r}</div><div class="serie-sub">${p>0?p+'kg':'Corp.'}</div><div class="serie-check${chk?' done-chk':''}" onclick="toggleCheck(${ei},${s})">${chk?'✓':''}</div></div>`;
  }
  document.getElementById(`series-${ei}`).innerHTML=html;
  document.getElementById(`prog-${ei}`).style.width=Math.round(countDone(ei,nS)/nS*100)+'%';
  document.querySelector(`#ej-card-${ei} span[style*="warn"]`).textContent=`${nS}×${nR}`;
  actualizarKPIs();
}

function toggleCheck(ei,si){
  const k=`${ei}-${si}`;sesion.checked[k]=!sesion.checked[k];
  const chk=sesion.checked[k];
  const box=document.getElementById(`sbox-${k}`);
  box.className='serie-box'+(chk?' done':'');
  const el=box.querySelector('.serie-check');
  el.className='serie-check'+(chk?' done-chk':'');el.textContent=chk?'✓':'';
  const ej=ejsActuales[ei];
  document.getElementById(`prog-${ei}`).style.width=Math.round(countDone(ei,ej.series)/ej.series*100)+'%';
  actualizarKPIs();
}

function actualizarKPIs(){
  let s=0,r=0,v=0;
  Object.entries(sesion.checked).forEach(([k,chk])=>{if(chk){s++;r+=sesion.reps[k]||0;v+=(sesion.reps[k]||0)*(sesion.pesos[k]||0);}});
  document.getElementById('k-series').textContent=s;
  document.getElementById('k-reps').textContent=r;
  document.getElementById('k-vol').textContent=v;
}

function guardarSesion(){
  const nombre=document.getElementById('sel-rutina').value;
  const dia=document.getElementById('sel-dia').value;
  const series=[];
  ejsActuales.forEach((ej,ei)=>{
    for(let s=0;s<ej.series;s++){
      const k=`${ei}-${s}`;
      series.push({ej:ej.nombre,musculo:ej.musculo,serie:s+1,reps:sesion.reps[k]||ej.reps,peso:sesion.pesos[k]||ej.peso,done:sesion.checked[k]||false,notas:sesion.notas[ei]||''});
    }
  });
  const total=series.filter(s=>s.done).length;
  if(total===0){toast('⚠️ Completá al menos 1 serie para guardar');return;}
  const hist=getHist();
  hist.unshift({fecha:new Date().toISOString(),dia,rutina:nombre,series,vol:parseInt(document.getElementById('k-vol').textContent)||0,repsTotal:parseInt(document.getElementById('k-reps').textContent)||0,seriesDone:total});
  setHist(hist);toast(`✅ Sesión guardada — ${total} series completadas`);
}

// ═══════════════════════════════════════════════════════
// MODAL IMAGEN
// ═══════════════════════════════════════════════════════
function abrirModalEj(id){
  const ej=getEj(id);if(!ej) return;
  document.getElementById('modal-ej-img').innerHTML=ej.svg;
  document.getElementById('modal-ej-nombre').textContent=ej.nombre;
  document.getElementById('modal-ej-musc').textContent=ej.musculo;
  document.getElementById('modal-ej-tip').textContent='💡 '+ej.tip;
  document.getElementById('modal-ej').classList.add('open');
}
function cerrarModal(e){if(e.target===document.getElementById('modal-ej')) document.getElementById('modal-ej').classList.remove('open');}

// ═══════════════════════════════════════════════════════
// HISTORIAL
// ═══════════════════════════════════════════════════════
function renderHistorial(){
  const hist=getHist();const cont=document.getElementById('historial-list');
  if(!hist.length){cont.innerHTML='<div class="empty">Aún no tenés sesiones guardadas.<br>Completá tu primer entrenamiento y guardalo.</div>';return;}
  cont.innerHTML=hist.map((s,i)=>{
    const f=new Date(s.fecha);
    const fStr=f.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'});
    const hStr=f.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    return `<div class="card-sm">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:14px;font-weight:600;color:var(--text)">${s.rutina}</div>
        <button class="btn btn-icon btn-danger" onclick="borrarSesion(${i})" style="width:26px;height:26px;font-size:12px">✕</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">
        <span style="font-size:12px;color:var(--text2)">${fStr} ${hStr}</span>
        <span class="chip">${s.dia}</span><span class="chip">${s.seriesDone} series</span><span class="chip">${s.vol}kg vol.</span>
      </div>
      <button class="btn btn-sm" onclick="toggleHistDetalle(${i})" style="width:100%;text-align:center;font-size:12px" id="btn-det-${i}">Ver detalle ▼</button>
      <div id="hist-det-${i}" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
        ${s.series.filter(sr=>sr.done).map(sr=>`<div class="hist-item"><div><div style="font-size:13px;font-weight:500;color:var(--text)">${sr.ej}</div><div style="font-size:11px;color:var(--text2)">${sr.musculo} — Serie ${sr.serie}</div></div><div style="font-size:12px;color:var(--text2);text-align:right">${sr.reps} reps × ${sr.peso>0?sr.peso+'kg':'corporal'}</div></div>`).join('')}
        ${s.series.find(sr=>sr.notas)?`<div style="margin-top:8px;padding:8px;background:var(--bg2);border-radius:7px;font-size:12px;color:var(--text2);font-style:italic">"${s.series.find(sr=>sr.notas).notas}"</div>`:''}
      </div>
    </div>`;
  }).join('');
}
function toggleHistDetalle(i){
  const d=document.getElementById(`hist-det-${i}`);const b=document.getElementById(`btn-det-${i}`);
  const open=d.style.display==='block';d.style.display=open?'none':'block';b.textContent=open?'Ver detalle ▼':'Ocultar ▲';
}
function borrarSesion(i){if(!confirm('¿Eliminar esta sesión?'))return;const h=getHist();h.splice(i,1);setHist(h);renderHistorial();toast('Sesión eliminada');}
function borrarTodoHistorial(){if(confirm('¿Borrar todo el historial?')){setHist([]);renderHistorial();toast('Historial borrado');}}

// ═══════════════════════════════════════════════════════
// PROGRESO
// ═══════════════════════════════════════════════════════
function renderProgresoSel(){
  const hist=getHist();const ejs=new Set();
  hist.forEach(s=>s.series.forEach(sr=>{if(sr.done)ejs.add(sr.ej);}));
  const sel=document.getElementById('sel-ej-prog');
  sel.innerHTML='<option value="">— Seleccionar ejercicio —</option>';
  [...ejs].sort().forEach(ej=>{const o=document.createElement('option');o.value=ej;o.textContent=ej;sel.appendChild(o);});
  if(!ejs.size) document.getElementById('progreso-content').innerHTML='<div class="empty">Guardá sesiones para ver tu progreso aquí.</div>';
  else mostrarProgreso();
}
function mostrarProgreso(){
  const ej=document.getElementById('sel-ej-prog').value;const cont=document.getElementById('progreso-content');
  if(!ej){cont.innerHTML='';return;}
  const hist=getHist();const puntos=[];
  hist.slice().reverse().forEach(s=>{
    const fStr=new Date(s.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
    s.series.filter(sr=>sr.ej===ej&&sr.done).forEach(sr=>{puntos.push({fecha:fStr,reps:sr.reps,peso:sr.peso,serie:sr.serie,vol:sr.reps*sr.peso});});
  });
  if(!puntos.length){cont.innerHTML='<div class="empty">Sin registros para este ejercicio.</div>';return;}
  const maxVol=Math.max(...puntos.map(p=>p.vol))||1;
  const ult=puntos[puntos.length-1];const pri=puntos[0];const mejora=ult.peso-pri.peso;
  cont.innerHTML=`
    <div class="kpi-row" style="margin-bottom:12px">
      <div class="kpi-box"><div class="kpi-val">${ult.peso>0?ult.peso+'kg':'—'}</div><div class="kpi-lbl">Último peso</div></div>
      <div class="kpi-box"><div class="kpi-val">${ult.reps}</div><div class="kpi-lbl">Últimas reps</div></div>
      <div class="kpi-box"><div class="kpi-val" style="color:${mejora>=0?'#34d399':'#f87171'}">${mejora>=0?'+':''}${mejora}kg</div><div class="kpi-lbl">Progreso</div></div>
    </div>
    <div class="card-sm">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Volumen (reps × kg)</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${puntos.slice(-20).map(p=>{const pct=Math.round(p.vol/maxVol*100);return `<div style="display:flex;align-items:center;gap:8px"><div style="font-size:11px;color:var(--text2);width:58px;flex-shrink:0">${p.fecha} S${p.serie}</div><div style="flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--y);border-radius:4px;transition:width .4s"></div></div><div style="font-size:11px;color:var(--text2);width:80px;text-align:right;flex-shrink:0">${p.reps}r × ${p.peso>0?p.peso+'kg':'corp.'}</div></div>`;}).join('')}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// CONSTRUCTOR DE RUTINAS
// ═══════════════════════════════════════════════════════
let ejsSeleccionados=[];
let filtroActivo='Todos';
let editandoIdx=-1;

function renderMisRutinas(){
  const custom=getCustomRutinas();
  const cont=document.getElementById('mis-rutinas-list');
  if(!custom.length){
    cont.innerHTML='<div class="empty">Todavía no creaste rutinas personalizadas.<br>Tocá "+ Nueva rutina" para empezar.</div>';
  } else {
    cont.innerHTML=`<div class="rutinas-custom-list">`+custom.map((r,i)=>`
      <div class="rut-item">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">${r.nombre}</div>
          <div style="font-size:11px;color:var(--text2)">${r.desc} · ${r.ejs.length} ejercicios</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm" onclick="editarRutina(${i})">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="borrarRutina(${i})">✕</button>
        </div>
      </div>`).join('')+`</div>`;
  }
}

function abrirConstructor(idx=-1){
  editandoIdx=idx;ejsSeleccionados=[];
  const custom=getCustomRutinas();
  document.getElementById('constructor-titulo').textContent=idx>=0?'Editar rutina':'Nueva rutina';
  document.getElementById('inp-rut-nombre').value=idx>=0?custom[idx].nombre:'';
  document.getElementById('inp-rut-desc').value=idx>=0?custom[idx].desc:'';
  if(idx>=0) ejsSeleccionados=[...custom[idx].ejs];
  document.getElementById('constructor').style.display='block';
  document.getElementById('mis-rutinas-list').style.display='none';
  document.querySelector('#view-misrutinas > div:first-child').style.display='none';
  renderFiltrosConstructor();renderEjLibGrid();renderEjsSeleccionados();
}

function editarRutina(i){abrirConstructor(i);}
function borrarRutina(i){
  if(!confirm('¿Eliminar esta rutina?'))return;
  const r=getCustomRutinas();r.splice(i,1);setCustomRutinas(r);initSelects();renderMisRutinas();toast('Rutina eliminada');
}

function cerrarConstructor(){
  document.getElementById('constructor').style.display='none';
  document.getElementById('mis-rutinas-list').style.display='block';
  document.querySelector('#view-misrutinas > div:first-child').style.display='flex';
}

function renderFiltrosConstructor(){
  const cont=document.getElementById('filter-chips-constructor');
  cont.innerHTML=['Todos',...GRUPOS].map(g=>`<button class="fchip${filtroActivo===g?' active':''}" onclick="filtrarGrupoConst('${g}')">${g}</button>`).join('');
}

function filtrarGrupoConst(g){filtroActivo=g;renderFiltrosConstructor();renderEjLibGrid();}

function renderEjLibGrid(){
  const grid=document.getElementById('ej-lib-grid');
  const lista=filtroActivo==='Todos'?EJERCICIOS_LIB:EJERCICIOS_LIB.filter(e=>e.grupo===filtroActivo);
  grid.innerHTML=lista.map(ej=>{
    const sel=ejsSeleccionados.includes(ej.id);
    return `<div class="ej-lib-item${sel?' selected':''}" onclick="toggleEjSel('${ej.id}')">
      <div class="ej-lib-thumb">${ej.svg}</div>
      <div><div class="ej-lib-name">${ej.nombre}</div><div class="ej-lib-musc">${ej.musculo}</div></div>
    </div>`;
  }).join('');
}

function toggleEjSel(id){
  const idx=ejsSeleccionados.indexOf(id);
  if(idx>=0) ejsSeleccionados.splice(idx,1); else ejsSeleccionados.push(id);
  renderEjLibGrid();renderEjsSeleccionados();
}

function renderEjsSeleccionados(){
  const wrap=document.getElementById('ej-seleccionados-wrap');
  const cont=document.getElementById('ej-seleccionados-list');
  if(!ejsSeleccionados.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  cont.innerHTML=ejsSeleccionados.map((id,i)=>{
    const ej=getEj(id);if(!ej)return'';
    return `<div class="ej-sel-item">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;background:var(--bg2);border-radius:5px;overflow:hidden;display:flex;align-items:center;justify-content:center">${ej.svg}</div>
        <div><div style="font-size:13px;font-weight:500;color:var(--text)">${ej.nombre}</div><div style="font-size:11px;color:var(--text2)">${ej.musculo}</div></div>
      </div>
      <button class="btn btn-icon btn-danger" onclick="quitarEjSel(${i})" style="width:26px;height:26px;font-size:11px">✕</button>
    </div>`;
  }).join('');
}

function quitarEjSel(i){ejsSeleccionados.splice(i,1);renderEjLibGrid();renderEjsSeleccionados();}

function guardarRutinaCustom(){
  const nombre=document.getElementById('inp-rut-nombre').value.trim();
  const desc=document.getElementById('inp-rut-desc').value.trim();
  if(!nombre){toast('⚠️ Escribí un nombre para la rutina');return;}
  if(!ejsSeleccionados.length){toast('⚠️ Seleccioná al menos un ejercicio');return;}
  const custom=getCustomRutinas();
  const nueva={nombre,desc:desc||'Rutina personalizada',ejs:[...ejsSeleccionados]};
  if(editandoIdx>=0) custom[editandoIdx]=nueva; else custom.push(nueva);
  setCustomRutinas(custom);initSelects();cerrarConstructor();renderMisRutinas();
  toast(`✅ Rutina "${nombre}" guardada`);
}

// ═══════════════════════════════════════════════════════
// BIBLIOTECA
// ═══════════════════════════════════════════════════════
let filtroBib='Todos';
function renderBiblioteca(){
  const fc=document.getElementById('filter-chips-bib');
  fc.innerHTML=['Todos',...GRUPOS].map(g=>`<button class="fchip${filtroBib===g?' active':''}" onclick="filtrarBib('${g}')">${g}</button>`).join('');
  renderBibGrid();
}
function filtrarBib(g){filtroBib=g;renderBiblioteca();}
function renderBibGrid(){
  const lista=filtroBib==='Todos'?EJERCICIOS_LIB:EJERCICIOS_LIB.filter(e=>e.grupo===filtroBib);
  const grid=document.getElementById('bib-grid');
  grid.innerHTML=lista.map(ej=>`
    <div class="card-sm" style="cursor:pointer" onclick="abrirModalEj('${ej.id}')">
      <div style="background:var(--bg2);border-radius:8px;display:flex;align-items:center;justify-content:center;height:80px;margin-bottom:8px;overflow:hidden">${ej.svg}</div>
      <div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.3">${ej.nombre}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">${ej.musculo}</div>
      <div style="font-size:10px;color:var(--text2);margin-top:4px;opacity:.7">${ej.series}×${ej.reps}${ej.peso>0?' · '+ej.peso+'kg':' · Corporal'}</div>
    </div>`).join('');
}

// INIT
initSelects();
</script>
